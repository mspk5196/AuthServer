version: "3.8"

services:
  cpanel-backend:
    build:
      context: ../Cpanel/auth-server
    image: mspkapps/cpanel-backend:${IMAGE_TAG}

  cpanel-frontend:
    build:
      context: ../Cpanel/CpanelWeb
      args:
        VITE_CPANEL_API_BASE_URL: ${VITE_CPANEL_API_BASE_URL}
        VITE_MAIN_PORTAL_URL: ${VITE_MAIN_PORTAL_URL}
    image: mspkapps/cpanel-frontend:${IMAGE_TAG}

  developer-backend:
    build:
      context: ../developerWeb/Backend
    image: mspkapps/dev-backend:${IMAGE_TAG}

  developer-frontend:
    build:
      context: ../developerWeb/authServerWeb
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_API_URL: ${VITE_API_URL}
        VITE_SUPPORT_EMAIL: ${VITE_SUPPORT_EMAIL}
    image: mspkapps/dev-frontend:${IMAGE_TAG}
