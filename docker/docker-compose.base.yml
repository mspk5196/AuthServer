version: "3.8"

services:
  cpanel-backend:
    image: mspkapps/cpanel-backend:${IMAGE_TAG}
    env_file:
      - /opt/envs/cpanel-backend.env
    restart: always
    networks: [webnet]

  cpanel-frontend:
    image: mspkapps/cpanel-frontend:${IMAGE_TAG}
    env_file:
      - /opt/envs/cpanel-frontend.env
    restart: always
    networks: [webnet]

  developer-backend:
    image: mspkapps/dev-backend:${IMAGE_TAG}
    env_file:
      - /opt/envs/dev-backend.env
    restart: always
    networks: [webnet]

  developer-frontend:
    image: mspkapps/dev-frontend:${IMAGE_TAG}
    env_file:
      - /opt/envs/dev-frontend.env
    restart: always
    networks: [webnet]

networks:
  webnet:
    external: true
