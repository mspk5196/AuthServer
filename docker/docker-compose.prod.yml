services:
  cpanel-backend:
    ports: ["5002:5000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cpanel-frontend:
    ports: ["4002:4000"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000"]
      interval: 30s
      timeout: 5s
      retries: 3

  developer-backend:
    ports: ["5001:5000"]

  developer-frontend:
    ports: ["4001:4000"]
