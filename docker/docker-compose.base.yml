version: "3.8"

services:
  cpanel-backend:
    container_name: cpanel-backend
    image: mspk5196/cpanel-backend:${IMAGE_TAG}
    env_file:
      - /opt/envs/cpanel-backend.env
    restart: always
    networks: [webnet]

  cpanel-frontend:
    container_name: cpanel-frontend
    image: mspk5196/cpanel-frontend:${IMAGE_TAG}
    env_file:
      - /opt/envs/cpanel-frontend.env
    restart: always
    networks: [webnet]

  developer-backend:
    container_name: developer-backend
    image: mspk5196/dev-backend:${IMAGE_TAG}
    env_file:
      - /opt/envs/dev-backend.env
    restart: always
    networks: [webnet]

  developer-frontend:
    container_name: developer-frontend
    image: mspk5196/dev-frontend:${IMAGE_TAG}
    env_file:
      - /opt/envs/dev-frontend.env
    restart: always
    networks: [webnet]

networks:
  webnet:
    external: true
